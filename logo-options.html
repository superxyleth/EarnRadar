<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EarnRadar Logo Options</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #0b0e11;
        color: #f5f5f5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 28px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 16px;
      }
      .item {
        padding: 18px;
        border: 1px solid rgba(240, 185, 11, 0.18);
        border-radius: 12px;
        background: #15181e;
      }
      img {
        display: block;
        width: 96px;
        height: 96px;
        margin-bottom: 14px;
      }
      strong {
        display: block;
        margin-bottom: 6px;
      }
      code {
        color: #a6adba;
        font-size: 12px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>EarnRadar Logo Options</h1>
      <section class="grid">
        <div class="item">
          <img src="./assets/logo-radar.svg" alt="Radar coin" />
          <strong>Option A: Radar Coin</strong>
          <code>assets/logo-radar.svg</code>
        </div>
        <div class="item">
          <img src="./assets/logo-signal.svg" alt="Signal star" />
          <strong>Option B: Signal Star</strong>
          <code>assets/logo-signal.svg</code>
        </div>
        <div class="item">
          <img src="./assets/logo-er.svg" alt="ER monogram" />
          <strong>Option C: ER Mark</strong>
          <code>assets/logo-er.svg</code>
        </div>
        <div class="item">
          <img src="./assets/logo-vault.svg" alt="Vault lock" />
          <strong>Option D: Earn Vault</strong>
          <code>assets/logo-vault.svg</code>
        </div>
        <div class="item">
          <img src="./assets/logo-compass.svg" alt="Compass" />
          <strong>Option E: Compass Radar</strong>
          <code>assets/logo-compass.svg</code>
        </div>
      </section>
    </main>
  </body>
</html>
