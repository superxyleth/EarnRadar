<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EarnRadar 活动雷达</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img class="brand-mark" src="./superxyleth-avatar.jpg" alt="superxyleth 头像" />
          <div>
            <h1>EarnRadar 活动雷达</h1>
            <p>追踪 Binance / OKX 的理财、Alpha 与交易任务</p>
          </div>
        </div>
        <div class="header-actions">
          <img class="author-avatar" src="./superxyleth-avatar.jpg" alt="superxyleth 头像" />
          <a class="author-link" href="https://x.com/superxyleth" target="_blank" rel="noreferrer">作者 X：@superxyleth</a>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <aside class="sidebar" aria-label="导航">
        <section class="nav-group">
          <div class="nav-title">交易所</div>
          <div id="exchangeTabs" class="nav-list">
            <button class="nav-item active" type="button" data-platform="all">
              <span>全部活动</span>
              <strong id="allCount">0</strong>
            </button>
            <button class="nav-item" type="button" data-platform="Binance">
              <span>Binance</span>
              <strong id="binanceCount">0</strong>
            </button>
            <button class="nav-item" type="button" data-platform="OKX">
              <span>OKX</span>
              <strong id="okxCount">0</strong>
            </button>
          </div>
        </section>

        <section id="moduleTabs" class="nav-group hidden" aria-label="Binance 模块">
          <div class="nav-title">Binance 模块</div>
          <div class="nav-list">
            <button class="nav-item active" type="button" data-module="finance">
              <span>理财模块</span>
              <strong id="financeCount">0</strong>
            </button>
            <button class="nav-item" type="button" data-module="alpha">
              <span>Alpha 模块</span>
              <strong id="alphaCount">0</strong>
            </button>
            <button class="nav-item" type="button" data-module="small">
              <span>撸毛小活动模块</span>
              <strong id="smallCount">0</strong>
            </button>
          </div>
        </section>

        <section id="okxModuleTabs" class="nav-group hidden" aria-label="OKX 模块">
          <div class="nav-title">OKX 模块</div>
          <div class="nav-list">
            <button class="nav-item active" type="button" data-module="flash">
              <span>闪赚模块</span>
              <strong id="flashCount">0</strong>
            </button>
            <button class="nav-item" type="button" data-module="onchain">
              <span>链上赚币</span>
              <strong id="onchainCount">0</strong>
            </button>
            <button class="nav-item" type="button" data-module="boost">
              <span>Boost 活动</span>
              <strong id="boostCount">0</strong>
            </button>
          </div>
        </section>
      </aside>

      <section class="content">
        <div class="content-head">
          <div>
            <h2 id="viewTitle">全部活动</h2>
            <p id="viewMeta">按开始时间倒序排列，优先展示可执行信息。</p>
          </div>
          <input id="searchInput" type="search" placeholder="搜索平台、币种、活动名称" />
        </div>

        <section class="summary" aria-label="概览">
          <div class="summary-item">
            <span>当前列表</span>
            <strong id="resultCount">0</strong>
          </div>
          <div class="summary-item">
            <span>已录入活动</span>
            <strong id="activityCount">0</strong>
          </div>
          <div class="summary-item">
            <span>进行中</span>
            <strong id="activeCount">0</strong>
          </div>
        </section>

        <section id="activityList" class="activity-list" aria-label="活动列表"></section>
      </section>
    </main>

    <script src="./data.js"></script>
    <script>
      const listEl = document.getElementById("activityList");
      const searchEl = document.getElementById("searchInput");
      const exchangeTabsEl = document.getElementById("exchangeTabs");
      const moduleTabsEl = document.getElementById("moduleTabs");
      const okxModuleTabsEl = document.getElementById("okxModuleTabs");
      const activityCountEl = document.getElementById("activityCount");
      const resultCountEl = document.getElementById("resultCount");
      const activeCountEl = document.getElementById("activeCount");
      const viewTitleEl = document.getElementById("viewTitle");
      const viewMetaEl = document.getElementById("viewMeta");
      const allCountEl = document.getElementById("allCount");
      const binanceCountEl = document.getElementById("binanceCount");
      const okxCountEl = document.getElementById("okxCount");
      const financeCountEl = document.getElementById("financeCount");
      const smallCountEl = document.getElementById("smallCount");
      const alphaCountEl = document.getElementById("alphaCount");
      const flashCountEl = document.getElementById("flashCount");
      const onchainCountEl = document.getElementById("onchainCount");
      const boostCountEl = document.getElementById("boostCount");

      const activities = window.financeActivities || [];
      const defaultModules = {
        Binance: "finance",
        OKX: "flash",
      };
      const platformNames = {
        all: "全部活动",
        Binance: "Binance",
        OKX: "OKX",
      };
      const moduleNames = {
        finance: "理财模块",
        alpha: "Alpha 模块",
        small: "撸毛小活动模块",
        flash: "闪赚模块",
        onchain: "链上赚币",
        boost: "Boost 活动",
      };
      let selectedPlatform = "all";
      let selectedModule = "finance";

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function filteredActivities() {
        const query = searchEl.value.trim().toLowerCase();
        return activities
          .filter((item) => {
            const text = `${item.platform} ${item.title} ${item.stablecoin} ${item.productType}`.toLowerCase();
            const matchesPlatform = selectedPlatform === "all" || item.platform === selectedPlatform;
            const matchesModule = !defaultModules[selectedPlatform] || moduleOf(item) === selectedModule;
            return matchesPlatform && matchesModule && (!query || text.includes(query));
          })
          .sort((a, b) => Date.parse(b.startAt.replace(" ", "T")) - Date.parse(a.startAt.replace(" ", "T")));
      }

      function moduleOf(item) {
        if (item.module) return item.module;
        if (item.platform === "OKX") return "flash";
        return item.module || "finance";
      }

      function updateCounts(filtered) {
        activityCountEl.textContent = activities.length;
        resultCountEl.textContent = filtered.length;
        activeCountEl.textContent = activities.filter((item) => item.status === "进行中").length;
        allCountEl.textContent = activities.length;
        binanceCountEl.textContent = activities.filter((item) => item.platform === "Binance").length;
        okxCountEl.textContent = activities.filter((item) => item.platform === "OKX").length;
        financeCountEl.textContent = activities.filter((item) => item.platform === "Binance" && moduleOf(item) === "finance").length;
        smallCountEl.textContent = activities.filter((item) => item.platform === "Binance" && moduleOf(item) === "small").length;
        alphaCountEl.textContent = activities.filter((item) => item.platform === "Binance" && moduleOf(item) === "alpha").length;
        flashCountEl.textContent = activities.filter((item) => item.platform === "OKX" && moduleOf(item) === "flash").length;
        onchainCountEl.textContent = activities.filter((item) => item.platform === "OKX" && moduleOf(item) === "onchain").length;
        boostCountEl.textContent = activities.filter((item) => item.platform === "OKX" && moduleOf(item) === "boost").length;
      }

      function updateViewLabel(filtered) {
        const platformLabel = platformNames[selectedPlatform] || selectedPlatform;
        const moduleLabel = defaultModules[selectedPlatform] ? moduleNames[selectedModule] : "";
        viewTitleEl.textContent = moduleLabel ? `${platformLabel} / ${moduleLabel}` : platformLabel;
        viewMetaEl.textContent = `${filtered.length} 条活动，按开始时间倒序排列`;
      }

      function render() {
        const filtered = filteredActivities();
        moduleTabsEl.classList.toggle("hidden", selectedPlatform !== "Binance");
        okxModuleTabsEl.classList.toggle("hidden", selectedPlatform !== "OKX");
        updateCounts(filtered);
        updateViewLabel(filtered);

        if (!filtered.length) {
          listEl.innerHTML = `<div class="empty-state">当前模块暂无活动。</div>`;
          return;
        }

        listEl.innerHTML = filtered
          .map(
            (item) => `
              <article class="activity-card">
                <div class="activity-main">
                  <div class="activity-head">
                    <div class="activity-heading">
                      <div class="tag-row">
                        <span class="platform-pill">${escapeHtml(item.platform)}</span>
                        <span class="module-pill">${escapeHtml(moduleNames[moduleOf(item)] || item.productType)}</span>
                        <span class="type-pill">${escapeHtml(item.productType)}</span>
                      </div>
                      <h3>${escapeHtml(item.title)}</h3>
                    </div>
                    <span class="status-pill">${escapeHtml(item.status)}</span>
                  </div>

                  <div class="signal-grid">
                    <div class="signal-card prize">
                      <span>奖励规模</span>
                      <strong>${escapeHtml(item.apr)}</strong>
                      <p>${escapeHtml(item.activityAmount)}</p>
                    </div>
                    <div class="signal-card">
                      <span>参与标的</span>
                      <strong>${escapeHtml(item.stablecoin)}</strong>
                    </div>
                    <div class="signal-card">
                      <span>参与门槛</span>
                      <strong>${escapeHtml(item.minAmount)}</strong>
                    </div>
                    <div class="signal-card time">
                      <span>活动周期</span>
                      <strong>${escapeHtml(item.startAt)} 至 ${escapeHtml(item.endAt)}</strong>
                      <p>${escapeHtml(item.timezone)}</p>
                    </div>
                  </div>

                  <div class="activity-actions">
                    <a class="button" href="${escapeHtml(item.tutorialUrl)}" target="_blank" rel="noreferrer">参与入口</a>
                    <a class="button secondary" href="${escapeHtml(item.officialUrl)}" target="_blank" rel="noreferrer">官方公告</a>
                  </div>
                </div>

                <details class="activity-details">
                  <summary>规则摘要</summary>
                  <div class="rule-box">
                    <ul>
                      ${item.rewardRule.map((rule) => `<li>${escapeHtml(rule)}</li>`).join("")}
                    </ul>
                  </div>
                  <div class="source-row">${escapeHtml(item.sourceNote)} 更新：${escapeHtml(item.updatedAt)}</div>
                </details>
              </article>
            `,
          )
          .join("");
      }

      exchangeTabsEl.addEventListener("click", (event) => {
        const tab = event.target.closest(".nav-item");
        if (!tab) return;
        selectedPlatform = tab.dataset.platform;
        if (defaultModules[selectedPlatform]) {
          selectedModule = defaultModules[selectedPlatform];
          [moduleTabsEl, okxModuleTabsEl].forEach((group) => {
            group.querySelectorAll(".nav-item").forEach((item) => {
              item.classList.toggle("active", item.dataset.module === selectedModule);
            });
          });
        }
        exchangeTabsEl.querySelectorAll(".nav-item").forEach((item) => {
          item.classList.toggle("active", item === tab);
        });
        render();
      });
      moduleTabsEl.addEventListener("click", (event) => {
        const tab = event.target.closest(".nav-item");
        if (!tab) return;
        selectedModule = tab.dataset.module;
        moduleTabsEl.querySelectorAll(".nav-item").forEach((item) => {
            item.classList.toggle("active", item.dataset.module === selectedModule);
        });
        render();
      });
      okxModuleTabsEl.addEventListener("click", (event) => {
        const tab = event.target.closest(".nav-item");
        if (!tab) return;
        selectedModule = tab.dataset.module;
        okxModuleTabsEl.querySelectorAll(".nav-item").forEach((item) => {
          item.classList.toggle("active", item === tab);
        });
        render();
      });
      searchEl.addEventListener("input", render);
      render();
    </script>
  </body>
</html>
